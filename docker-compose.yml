services:
  postgres:
    image: postgres:15-alpine
    container_name: supplier-gatekeeper-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gatekeeper}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gatekeeper123}
      POSTGRES_DB: ${POSTGRES_DB:-supplier_gatekeeper}
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
      - ./deploy/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gatekeeper -d supplier_gatekeeper"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: supplier-gatekeeper-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - ./minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: supplier-gatekeeper-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://gatekeeper:gatekeeper123@postgres:5432/supplier_gatekeeper}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET_NAME: ${MINIO_BUCKET_NAME:-supplier-documents}
      MINIO_USE_SSL: ${MINIO_USE_SSL:-false}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-1440}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3009}
      APP_ENV: ${APP_ENV:-production}
      DEBUG: ${DEBUG:-false}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-http://localhost:3009}
      GMAIL_OAUTH_CALLBACK_PATH: ${GMAIL_OAUTH_CALLBACK_PATH:-/api/pmc/gmail/oauth/callback}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_BASE_URL: ${AI_BASE_URL:-https://your-ai-endpoint.example.com/v1}
      AI_MODEL: ${AI_MODEL:-gpt-4o}
      PMC_INVENTORY_ADJUSTMENT_AI_ENABLED: ${PMC_INVENTORY_ADJUSTMENT_AI_ENABLED:-true}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./backend/oauth_credentials.json:/app/backend/oauth_credentials.json:ro
      - ./backend/token.json:/app/backend/token.json:rw
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 20s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: supplier-gatekeeper-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-3009}:3000"
